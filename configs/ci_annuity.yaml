initial_reserve: 50000.0

returns:
  source: csv
  csv_path: ../data/sample_returns.csv

equity_regions:
  US: 0.35
  HK: 0.25
  CN: 0.40

live_fetch:
  us_symbol: "SPY"
  hk_symbol: "^HSI"
  cn_symbol: "000300"
  bond_symbol: "IEF"
  fred_fx_usdcny: "DEXCHUS"
  fred_fx_usdhkd: "DEXHKUS"
