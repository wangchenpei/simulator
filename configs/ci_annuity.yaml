product_id: ci_annuity
label: "重疾 + 年金（CI & annuity）"
accounting_currency: CNY

# 股 15%-40%，债 60%-85%；默认 25/75
equity_weight: 0.25
bond_weight: 0.75
equity_min: 0.15
equity_max: 0.40
bond_min: 0.60
