# 最长历史行情组合（在 participating 基础上覆盖 live_fetch）
# 推荐：先 diagnose-history --preset long，再 fetch-live --preset long

product_id: participating
label: "分红储蓄（Participating / long history）"
accounting_currency: CNY

equity_weight: 0.60
bond_weight: 0.40
equity_min: 0.45
equity_max: 0.75
bond_min: 0.25
bond_max: 0.55

smoothing_threshold: 0.065
max_fill_fraction_of_shortfall: 1.0

rebalance_frequency: annual

initial_main_value: 1000000.0
initial_reserve: 0.0

returns:
  source: csv
  csv_path: ../data/live_participating_long.csv

equity_regions:
  US: 0.40
  HK: 0.30
  CN: 0.30

live_fetch:
  us_symbol: "SPY"       # 美股 ETF（AkShare）；与沪深300同期约 2005+
  hk_symbol: "^HSI"      # 恒生指数（Stooq/Yahoo）；避免 2800.HK 早期脏数据
  cn_symbol: "000300"    # 沪深300；指数约 2005-04 起（硬上限）
  bond_symbol: "IEF"     # 7-10年美债 ETF；AkShare 通常远早于 BND
  fred_fx_usdcny: "DEXCHUS"
  fred_fx_usdhkd: "DEXHKUS"
  # cn_csv_path: ../data/csi300_daily.csv   # 可选：本地 A 股日线更稳
